<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lina Melissa Arndt — UX/UI Designerin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gasoek+One&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles2.css">
</head>
<body>

<div class="hero-scale-wrap">
  <section class="hero">

    <svg class="squiggle squiggle-1" viewBox="0 0 151 130" fill="none" aria-hidden="true">
      <path d="M120 8 C 145 8, 145 55, 105 72 C 65 90, 65 118, 105 126" stroke="#9DC0A3" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
    </svg>

    <svg class="squiggle squiggle-2" viewBox="0 0 178 146" fill="none" aria-hidden="true">
      <path d="M25 10 C -15 30, -15 90, 40 110 C 85 126, 110 100, 92 72" stroke="#9DC0A3" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
    </svg>

    <div class="name-cluster">
      <svg class="cursor-doodle" viewBox="0 0 33 33" fill="none" aria-hidden="true">
        <path d="M29 4 L4 29 M11 29 L4 29 L4 22" stroke="#25302A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="name-pill">
        <img src="https://www.figma.com/api/mcp/asset/4f76b10d-aa21-4bee-9afa-7854444de681" alt="Lina Melissa Arndt" class="name-pill-photo">
        <span>Lina Melissa Arndt</span>
      </div>
    </div>

    <h1 class="headline">
      <span class="line line-dark">soft edges in a</span>
      <span class="line line-light">sharp world.</span>
    </h1>

    <div class="photo-cluster">
      <div class="photo-card"></div>
      <div class="photo-circle">
        <img src="https://www.figma.com/api/mcp/asset/4f76b10d-aa21-4bee-9afa-7854444de681" alt="Lina Melissa Arndt">
      </div>
      <div class="badge">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2l2.2 6.8H21l-5.6 4.2 2.2 6.8-5.6-4.2L6.4 20l2.2-6.8L3 8.8h6.8z" fill="white"/></svg>
        <span>UX/UI Designerin</span>
      </div>
    </div>

    <div class="cta-row">
      <button class="btn-primary">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 3v12M6.5 10.5L12 16l5.5-5.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 20h16" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
        CV herunterladen
      </button>
      <button class="btn-secondary">
        Über mich
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 12h16M14 6l6 6-6 6" stroke="#25302A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="stats-row">
      <div class="stat"><span class="stat-num">3</span><span class="stat-label">Case Studies</span></div>
      <div class="stat"><span class="stat-num">4</span><span class="stat-label">Blogartikel</span></div>
      <div class="stat"><span class="stat-num">9</span><span class="stat-label">Projekte</span></div>
    </div>

  </section>
</div>

<script src="script2.js"></script>
</body>
</html>
