<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seite nicht gefunden — Lina Melissa</title>
<meta name="robots" content="noindex">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gasoek+One&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body{ cursor:auto; }
  a, button{ cursor:pointer; }
  .nf-wrap{
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:40px 24px;
  }
  .nf-code{
    font-family:'Gasoek One', sans-serif; font-weight:400;
    font-size:clamp(80px,22vw,180px); line-height:1;
    background:linear-gradient(120deg,var(--green-dark) 0%,var(--green-light) 50%,var(--coral) 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    letter-spacing:-.02em;
  }
  .nf-title{
    font-family:'Inter', sans-serif; font-size:clamp(24px,5vw,34px); font-weight:600;
    color:var(--ink); margin:16px 0 12px; letter-spacing:-.01em;
  }
  .nf-text{ font-size:16px; color:var(--port-ink-soft); max-width:420px; line-height:1.7; margin-bottom:36px; }
  .nf-btn{
    display:inline-flex; align-items:center; gap:8px;
    background:linear-gradient(120deg,var(--green-dark) 0%,var(--ink) 100%);
    color:#fff; text-decoration:none; padding:14px 28px; border-radius:100px;
    font-size:15px; font-weight:600;
    transition:filter .2s,transform .15s,box-shadow .2s;
    box-shadow:0 4px 16px rgba(37,48,42,0.25);
  }
  .nf-btn:hover{ filter:brightness(1.1); transform:translateY(-2px); box-shadow:0 8px 24px rgba(37,48,42,0.3); }
  .nf-btn svg{ width:16px; height:16px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
</style>
</head>
<body>
<div class="nf-wrap">
  <div class="nf-code">404</div>
  <h1 class="nf-title" data-de="Diese Seite hat sich verlaufen." data-en="This page got lost.">Diese Seite hat sich verlaufen.</h1>
  <p class="nf-text" data-de="Passt eigentlich zum Thema — manchmal findet man nicht den Weg, den man gesucht hat. Lass uns zurück zum Anfang gehen." data-en="Fitting, really — sometimes you don't find the path you were looking for. Let's head back to the start.">Passt eigentlich zum Thema — manchmal findet man nicht den Weg, den man gesucht hat. Lass uns zurück zum Anfang gehen.</p>
  <a href="index.html" class="nf-btn">
    <svg viewBox="0 0 24 24"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
    <span data-de="Zur Startseite" data-en="Back to home">Zur Startseite</span>
  </a>
</div>
<script src="script.js"></script>
</body>
</html>
